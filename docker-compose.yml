version: '3.8'

services:
  # --- MySQL Database Service ---
  db:
    image: mysql:8.0
    container_name: workbridge-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      # Expose the database port to the host machine for direct access if needed
      - "3306:3306"
    volumes:
      # Persist database data
      - db_data:/var/lib/mysql

  # --- Backend (Spring Boot) Service ---
  backend:
    build:
      context: ./HRManagementSystem-Backend/HRManagementSystem
      dockerfile: Dockerfile
    container_name: workbridge-backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      # Expose the backend API port to the host machine
      - "8080:8080"
    environment:
      # Use the service name 'db' to connect to the MySQL container
      - spring.datasource.url=jdbc:mysql://db:3306/workbridge_db?useSSL=false
      - spring.datasource.username=${DB_USERNAME}
      - spring.datasource.password=${DB_PASSWORD}
      # IMPORTANT: Use strong, unique secrets in a real deployment
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}

  # --- Frontend (React + Nginx) Service ---
  frontend:
    build:
      context: ./HRManagementSystem-Frontend
      dockerfile: Dockerfile
      args:
        # This URL is what the user's browser will use to call the backend.
        # Since the backend port (8080) is exposed to the host, 'localhost' works.
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: workbridge-frontend
    restart: unless-stopped
    ports:
      # Expose the frontend web server to the host machine on port 80 (http)
      - "80:80"
    depends_on:
      - backend

# --- Docker Volumes ---
volumes:
  db_data:
