server {
  listen 80;
  server_name localhost;

  # Set the root directory for static files
  root /usr/share/nginx/html;
  index index.html;

  # This is the crucial part for Single Page Applications (SPAs) like React.
  # It ensures that any request that doesn't match a file or directory
  # is redirected to index.html, allowing React Router to handle the routing.
  location / {
    try_files $uri /index.html;
  }
}